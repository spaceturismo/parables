<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#FFF5E1" stroke="#D4A843" stroke-width="8"/>

  <!-- Scroll/book shape -->
  <g transform="translate(256, 270)">
    <!-- Left scroll curl -->
    <ellipse cx="-110" cy="0" rx="22" ry="80" fill="#D4A843" opacity="0.9"/>
    <ellipse cx="-110" cy="0" rx="12" ry="72" fill="#F5E6C8"/>

    <!-- Right scroll curl -->
    <ellipse cx="110" cy="0" rx="22" ry="80" fill="#D4A843" opacity="0.9"/>
    <ellipse cx="110" cy="0" rx="12" ry="72" fill="#F5E6C8"/>

    <!-- Parchment body -->
    <rect x="-95" y="-70" width="190" height="140" rx="4" fill="#F5E6C8" stroke="#D4A843" stroke-width="2"/>

    <!-- Text lines on scroll -->
    <line x1="-65" y1="-40" x2="65" y2="-40" stroke="#C4A87A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-65" y1="-18" x2="65" y2="-18" stroke="#C4A87A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-65" y1="4" x2="45" y2="4" stroke="#C4A87A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-65" y1="26" x2="55" y2="26" stroke="#C4A87A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-65" y1="48" x2="35" y2="48" stroke="#C4A87A" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Cross above the scroll -->
  <g transform="translate(256, 110)">
    <rect x="-8" y="-40" width="16" height="80" rx="3" fill="#8B6914"/>
    <rect x="-28" y="-20" width="56" height="16" rx="3" fill="#8B6914"/>
    <!-- Warm glow -->
    <circle cx="0" cy="0" r="30" fill="#FFD700" opacity="0.2"/>
  </g>

  <!-- Small decorative wheat/seed elements -->
  <g opacity="0.6">
    <circle cx="160" cy="400" r="6" fill="#8B6914"/>
    <circle cx="180" cy="410" r="4" fill="#A08030"/>
    <circle cx="340" cy="395" r="5" fill="#8B6914"/>
    <circle cx="355" cy="408" r="4" fill="#A08030"/>
  </g>
</svg>
